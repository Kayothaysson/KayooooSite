<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kayooo</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --neon: #00c8ff;
      --neon2: #0066ff;
      --neon3: #00ffea;
      --bg: #020b18;
      --panel: rgba(0, 200, 255, 0.04);
      --border: rgba(0, 200, 255, 0.18);
      --glow: 0 0 10px #00c8ff88, 0 0 30px #00c8ff44;
      --glow-strong: 0 0 10px #00c8ff, 0 0 40px #00c8ff88, 0 0 80px #00c8ff33;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: #cce8ff;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,200,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* LOGIN */
    #loginScreen {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      animation: fadeIn .6s ease;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(42px, 8vw, 80px);
      font-weight: 900;
      letter-spacing: 12px;
      color: var(--neon);
      text-shadow: var(--glow-strong);
      text-transform: uppercase;
      text-align: center;
      animation: pulseGlow 3s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%,100% { text-shadow: 0 0 10px #00c8ff, 0 0 40px #00c8ff88, 0 0 80px #00c8ff33; }
      50%      { text-shadow: 0 0 20px #00c8ff, 0 0 60px #00c8ffaa, 0 0 120px #00c8ff55; }
    }

    .login-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px 40px;
      width: min(420px, 92vw);
      box-shadow: 0 0 40px rgba(0,200,255,0.08), inset 0 1px 0 rgba(0,200,255,0.1);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--neon);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .neon-input {
      width: 100%;
      background: rgba(0,200,255,0.05);
      border: 1px solid rgba(0,200,255,0.25);
      border-radius: 6px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 600;
      padding: 12px 16px;
      outline: none;
      transition: all .3s;
      letter-spacing: 2px;
    }

    .neon-input::placeholder { color: rgba(0,200,255,0.25); letter-spacing: 1px; }
    .neon-input:focus {
      border-color: var(--neon);
      box-shadow: var(--glow), inset 0 0 10px rgba(0,200,255,0.05);
      background: rgba(0,200,255,0.08);
    }

    .neon-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--neon);
      border-radius: 6px;
      color: var(--neon);
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 4px;
      padding: 14px;
      cursor: pointer;
      transition: all .3s;
      text-transform: uppercase;
      margin-top: 6px;
      position: relative;
      overflow: hidden;
    }

    .neon-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--neon);
      opacity: 0;
      transition: opacity .3s;
    }

    .neon-btn span { position: relative; z-index: 1; }
    .neon-btn:hover { box-shadow: var(--glow-strong); color: #000; }
    .neon-btn:hover::before { opacity: 1; }

    .admin-link {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(0,200,255,0.25);
      text-align: center;
      cursor: pointer;
      text-transform: uppercase;
      transition: color .3s;
    }
    .admin-link:hover { color: rgba(0,200,255,0.6); }

    /* CHAT */
    #chatScreen {
      display: none;
      position: fixed; inset: 0;
      z-index: 10;
      flex-direction: column;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(2,11,24,0.95);
      backdrop-filter: blur(10px);
    }

    .header-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 8px;
      color: var(--neon);
      text-shadow: var(--glow);
    }

    .header-info { display: flex; align-items: center; gap: 20px; }

    .room-badge {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(0,200,255,0.6);
      border: 1px solid rgba(0,200,255,0.2);
      padding: 4px 12px;
      border-radius: 20px;
    }

    .online-dot { display: flex; align-items: center; gap: 6px; font-size: 12px; letter-spacing: 2px; color: var(--neon3); }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--neon3);
      box-shadow: 0 0 8px var(--neon3);
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-track { background: transparent; }
    .messages-area::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.2); border-radius: 2px; }

    .msg-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 70%;
      animation: slideIn .3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-wrapper.mine  { align-self: flex-end; align-items: flex-end; }
    .msg-wrapper.other { align-self: flex-start; align-items: flex-start; }

    .msg-sender {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .msg-wrapper.mine  .msg-sender { color: var(--neon); }
    .msg-wrapper.other .msg-sender { color: var(--neon3); }

    .msg-bubble {
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: .5px;
      max-width: 100%;
      word-break: break-word;
      position: relative;
    }

    .msg-wrapper.mine .msg-bubble {
      background: rgba(0,100,255,0.15);
      border: 1px solid rgba(0,100,255,0.4);
      color: #d0eeff;
      box-shadow: 0 0 12px rgba(0,100,255,0.2);
    }

    .msg-wrapper.other .msg-bubble {
      background: rgba(0,200,255,0.07);
      border: 1px solid rgba(0,200,255,0.2);
      color: #cce8ff;
    }

    .msg-time { font-size: 10px; color: rgba(0,200,255,0.3); margin-top: 3px; letter-spacing: 1px; }

    .delete-btn {
      display: flex;
      position: absolute;
      top: -8px; right: -8px;
      width: 20px; height: 20px;
      background: rgba(255,50,50,0.75);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .sys-msg {
      align-self: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(0,200,255,0.35);
      background: rgba(0,200,255,0.04);
      border: 1px solid rgba(0,200,255,0.1);
      padding: 5px 14px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .chat-input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: rgba(2,11,24,0.95);
      backdrop-filter: blur(10px);
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    #msgInput {
      flex: 1;
      background: rgba(0,200,255,0.05);
      border: 1px solid rgba(0,200,255,0.2);
      border-radius: 8px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 17px;
      padding: 12px 16px;
      outline: none;
      resize: none;
      min-height: 48px;
      max-height: 120px;
      transition: all .3s;
    }

    #msgInput::placeholder { color: rgba(0,200,255,0.25); }
    #msgInput:focus { border-color: var(--neon); box-shadow: var(--glow); }

    .send-btn {
      width: 48px; height: 48px;
      background: rgba(0,200,255,0.1);
      border: 1px solid rgba(0,200,255,0.3);
      border-radius: 8px;
      color: var(--neon);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .3s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--neon); color: #000; box-shadow: var(--glow-strong); }
    .send-btn svg { width: 20px; height: 20px; }

    .status-bar {
      text-align: center;
      padding: 4px;
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(0,200,255,0.25);
    }

    .leave-btn {
      background: transparent;
      border: 1px solid rgba(255,50,50,0.3);
      color: rgba(255,80,80,0.6);
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      letter-spacing: 2px;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all .3s;
    }
    .leave-btn:hover { background: rgba(255,50,50,0.1); color: #ff5050; border-color: #ff5050; }

    .corner { position: fixed; width: 60px; height: 60px; border-color: rgba(0,200,255,0.15); border-style: solid; z-index: 5; pointer-events: none; }
    .corner-tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
    .corner-tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
    .corner-br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .typing-indicator {
      display: none;
      align-self: flex-start;
      padding: 8px 16px;
      background: rgba(0,200,255,0.05);
      border: 1px solid rgba(0,200,255,0.15);
      border-radius: 10px;
      gap: 5px;
      align-items: center;
    }

    .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--neon); animation: typingBounce 1.2s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }

    @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); opacity: .4; } 30% { transform: translateY(-5px); opacity: 1; } }

    .empty-state { align-self: center; margin: auto; text-align: center; opacity: .3; }
    .empty-state svg { width: 48px; height: 48px; color: var(--neon); margin-bottom: 12px; }
    .empty-state p { font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 3px; color: var(--neon); }

    /* ADMIN */
    #adminScreen {
      display: none;
      position: fixed; inset: 0;
      z-index: 20;
      background: var(--bg);
      flex-direction: column;
      padding: 24px;
      gap: 20px;
      overflow-y: auto;
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    .admin-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 6px;
      color: var(--neon);
      text-shadow: var(--glow);
    }

    .admin-section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .admin-section h3 {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--neon);
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .admin-room-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(0,200,255,0.08);
      font-size: 14px;
    }

    .admin-room-item:last-child { border-bottom: none; }

    .admin-del-btn {
      background: transparent;
      border: 1px solid rgba(255,50,50,0.4);
      color: rgba(255,80,80,0.7);
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      letter-spacing: 2px;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: all .3s;
    }
    .admin-del-btn:hover { background: rgba(255,50,50,0.15); color: #ff5050; }

    .admin-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-card {
      background: rgba(0,200,255,0.05);
      border: 1px solid rgba(0,200,255,0.15);
      border-radius: 8px;
      padding: 14px;
      text-align: center;
    }

    .stat-number {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 900;
      color: var(--neon);
      text-shadow: var(--glow);
    }

    .stat-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(0,200,255,0.4);
      margin-top: 4px;
      text-transform: uppercase;
    }

    /* MODAL ADMIN LOGIN */
    #adminModal {
      display: none;
      position: fixed; inset: 0;
      z-index: 30;
      background: rgba(2,11,24,0.95);
      align-items: center;
      justify-content: center;
    }

    .modal-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px 40px;
      width: min(360px, 92vw);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      letter-spacing: 5px;
      color: var(--neon);
      text-align: center;
      text-transform: uppercase;
    }
    .geo-btn {
      background: transparent;
      border: 1px solid var(--neon);
      color: var(--neon);
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: all .3s;
      margin-bottom: 12px;
    }
    .geo-btn:hover { background: var(--neon); color: #000; box-shadow: var(--glow-strong); }
    .geo-card {
      background: rgba(0,200,255,0.04);
      border: 1px solid rgba(0,200,255,0.12);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .geo-card .row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 14px;
    }
    .geo-card .label { color: rgba(0,200,255,0.5); }
    .geo-card .value { color: #fff; font-family: monospace; }
  </style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="logo">Kayooo</div>

  <div class="login-box">
    <div>
      <div class="field-label">Seu nome</div>
      <input id="nameInput" class="neon-input" type="text" placeholder="Digite seu nome..." maxlength="20" autocomplete="off"/>
    </div>
    <div>
      <div class="field-label">Número da sala</div>
      <input id="roomInput" class="neon-input" type="tel" placeholder="Ex: 1234" autocomplete="off"/>
    </div>
    <button class="neon-btn" onclick="enterRoom()"><span>⟶ ENTRAR NA SALA</span></button>
    <div class="admin-link" onclick="openAdminModal()">· · ·</div>
  </div>
</div>

<!-- CHAT -->
<div id="chatScreen">
  <div class="chat-header">
    <div class="header-title">Kayooo</div>
    <div class="header-info">
      <div class="room-badge">SALA · <span id="roomLabel"></span></div>
      <div class="online-dot"><div class="dot"></div> <span id="onlineLabel">ONLINE</span></div>
      <button class="leave-btn" onclick="leaveRoom()">SAIR</button>
    </div>
  </div>

  <div class="messages-area" id="messagesArea">
    <div class="empty-state" id="emptyState">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
      </svg>
      <p>Aguardando mensagens...</p>
    </div>
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <div class="chat-input-area">
    <textarea id="msgInput" placeholder="Digite sua mensagem..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this); sendTyping()"></textarea>
    <button class="send-btn" onclick="sendMsg()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
      </svg>
    </button>
  </div>
  <div class="status-bar">CONECTADO · CRIPTOGRAFADO · PRIVADO</div>
</div>

<!-- ADMIN MODAL LOGIN -->
<div id="adminModal">
  <div class="modal-box">
    <div class="modal-title">Acesso Admin</div>
    <div>
      <div class="field-label">Senha</div>
      <input id="adminPassInput" class="neon-input" type="password" placeholder="••••••••" autocomplete="off" onkeydown="if(event.key==='Enter') checkAdminPass()"/>
    </div>
    <button class="neon-btn" onclick="checkAdminPass()"><span>ENTRAR</span></button>
    <button class="leave-btn" style="width:100%;text-align:center;" onclick="closeAdminModal()">CANCELAR</button>
  </div>
</div>

<!-- ADMIN SCREEN -->
<div id="adminScreen">
  <div class="admin-header">
    <div class="admin-title">⚡ Painel Admin</div>
    <button class="leave-btn" onclick="closeAdmin()">SAIR</button>
  </div>

  <div class="admin-stats">
    <div class="stat-card">
      <div class="stat-number" id="statRooms">0</div>
      <div class="stat-label">Salas ativas</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="statUsers">0</div>
      <div class="stat-label">Usuários online</div>
    </div>
  </div>

  <div class="admin-section">
    <h3>Salas ativas</h3>
    <div id="adminRoomList"><div style="color:rgba(0,200,255,0.3);font-size:13px;">Carregando...</div></div>
  </div>

  <div class="admin-section">
    <h3>Apagar sala específica</h3>
    <div class="admin-section">
    <h3>📍 Geolocalização dos Usuários</h3>
    <button class="geo-btn" onclick="coletarGeo()">📡 COLETAR IP + LOCALIZAÇÃO</button>
    <div id="geoList"><div style="color:rgba(0,200,255,0.3);font-size:13px;">Clique no botão acima</div></div>
  </div>
    <div style="display:flex;gap:10px;">
      <input id="deleteRoomInput" class="neon-input" type="tel" placeholder="Número da sala" style="font-size:15px;padding:10px 14px;"/>
      <button class="neon-btn" style="width:auto;padding:10px 20px;margin:0;" onclick="deleteRoom()"><span>APAGAR</span></button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getDatabase, ref, push, onChildAdded, set, onDisconnect,
    serverTimestamp, onValue, remove, get
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDaSSEgZRnLcwF8Mn4gsypwQBQaUvsYPOA",
    authDomain: "kayo-chat.firebaseapp.com",
    databaseURL: "https://kayo-chat-default-rtdb.firebaseio.com",
    projectId: "kayo-chat",
    storageBucket: "kayo-chat.firebasestorage.app",
    messagingSenderId: "744949820687",
    appId: "1:744949820687:web:0342bb17f6070c1118e27a"
  };

  // =============================================
  // SENHA DO ADMIN — TROQUE PARA A SUA SENHA
  const ADMIN_PASSWORD = "kayo2025admin";
  // =============================================

  let app, db;
  let myName = '', roomId = '', userId = '';
  let messagesRef, typingRef, presenceRef;
  let typingTimeout;
  let isConnected = false;
  const renderedKeys = new Set();

  function initFirebase() {
    try {
      app = initializeApp(firebaseConfig);
      db = getDatabase(app);
      isConnected = true;
    } catch(e) {
      isConnected = false;
    }
  }

  initFirebase();

  window.enterRoom = function() {
    const name = document.getElementById('nameInput').value.trim();
    const room = document.getElementById('roomInput').value.trim();
    if (!name) { shake('nameInput'); return; }
    if (!room)  { shake('roomInput'); return; }

    myName = name;
    roomId = room;
    userId = Date.now().toString(36) + Math.random().toString(36).slice(2);
    renderedKeys.clear();

    document.getElementById('roomLabel').textContent = room;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('chatScreen').style.display = 'flex';

    if (isConnected) {
      messagesRef = ref(db, `rooms/${roomId}/messages`);
      typingRef   = ref(db, `rooms/${roomId}/typing/${userId}`);
      presenceRef = ref(db, `rooms/${roomId}/presence/${userId}`);

      set(presenceRef, { name: myName, ts: serverTimestamp() });
      onDisconnect(presenceRef).remove();
      onDisconnect(typingRef).remove();

      onValue(ref(db, `rooms/${roomId}/presence`), snap => {
        const count = snap.exists() ? Object.keys(snap.val()).length : 1;
        document.getElementById('onlineLabel').textContent = count > 1 ? `${count} ONLINE` : 'ONLINE';
      });

      onChildAdded(messagesRef, (snap) => {
        const key = snap.key;
        if (renderedKeys.has(key)) return;
        renderedKeys.add(key);
        const d = snap.val();
        renderMsg(d.name, d.text, d.name === myName, d.time, snap.ref);
      });

      onValue(ref(db, `rooms/${roomId}/typing`), snap => {
        if (!snap.exists()) { hideTyping(); return; }
        const others = Object.entries(snap.val()).filter(([k]) => k !== userId).map(([,v]) => v.name);
        others.length > 0 ? showTyping() : hideTyping();
      });
    } else {
      addSysMsg('Modo demo — configure o Firebase para chat real');
    }

    addSysMsg(`Você entrou na sala ${room} como ${name}`);
    document.getElementById('msgInput').focus();
  };

  window.sendMsg = function() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    autoResize(input);

    if (isConnected) {
      push(messagesRef, {
        name: myName,
        text,
        time: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}),
        ts: serverTimestamp()
      });
      set(typingRef, null);
    } else {
      renderMsg(myName, text, true, now(), null);
    }
  };

  window.sendTyping = function() {
    if (!isConnected) return;
    set(typingRef, { name: myName });
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => set(typingRef, null), 2000);
  };

  window.leaveRoom = function() {
    if (isConnected && presenceRef) {
      remove(presenceRef);
      remove(typingRef);
    }
    location.reload();
  };

  function renderMsg(name, text, isMine, time, msgRef) {
    document.getElementById('emptyState')?.remove();
    const area = document.getElementById('messagesArea');
    const typing = document.getElementById('typingIndicator');

    const wrap = document.createElement('div');
    wrap.className = `msg-wrapper ${isMine ? 'mine' : 'other'}`;

    const delBtn = isMine && msgRef
      ? `<button class="delete-btn" onclick="deleteMsgRef(this)" data-ref="${msgRef.toString()}">✕</button>`
      : '';

    wrap.innerHTML = `
      <div class="msg-sender">${escHtml(name)}</div>
      <div class="msg-bubble">${escHtml(text)}${delBtn}</div>
      <div class="msg-time">${time || now()}</div>
    `;
    area.insertBefore(wrap, typing);
    area.scrollTop = area.scrollHeight;
  }

  window.deleteMsgRef = function(btn) {
    if (!confirm('Apagar esta mensagem?')) return;
    const refPath = btn.getAttribute('data-ref');
    const msgRef = ref(db, refPath.replace('https://kayo-chat-default-rtdb.firebaseio.com/', ''));
    remove(msgRef);
    btn.closest('.msg-wrapper').remove();
  };

  // ADMIN
  window.openAdminModal = function() {
    document.getElementById('adminModal').style.display = 'flex';
    document.getElementById('adminPassInput').value = '';
    setTimeout(() => document.getElementById('adminPassInput').focus(), 100);
  };

  window.closeAdminModal = function() {
    document.getElementById('adminModal').style.display = 'none';
  };

  window.checkAdminPass = function() {
    const pass = document.getElementById('adminPassInput').value;
    if (pass === ADMIN_PASSWORD) {
      document.getElementById('adminModal').style.display = 'none';
      openAdmin();
    } else {
      const input = document.getElementById('adminPassInput');
      input.style.borderColor = '#ff4466';
      input.style.boxShadow = '0 0 12px #ff446688';
      setTimeout(() => { input.style.borderColor = ''; input.style.boxShadow = ''; }, 800);
    }
  };

  function openAdmin() {
    document.getElementById('adminScreen').style.display = 'flex';
    loadAdminData();
  }

  window.closeAdmin = function() {
    document.getElementById('adminScreen').style.display = 'none';
  };

  function loadAdminData() {
    if (!isConnected) return;
    onValue(ref(db, 'rooms'), snap => {
      if (!snap.exists()) {
        document.getElementById('adminRoomList').innerHTML = '<div style="color:rgba(0,200,255,0.3);font-size:13px;">Nenhuma sala ativa</div>';
        document.getElementById('statRooms').textContent = '0';
        document.getElementById('statUsers').textContent = '0';
        return;
      }

      const rooms = snap.val();
      const roomIds = Object.keys(rooms);
      document.getElementById('statRooms').textContent = roomIds.length;

      let totalUsers = 0;
      let html = '';

      roomIds.forEach(rid => {
        const presence = rooms[rid].presence ? Object.keys(rooms[rid].presence).length : 0;
        const msgs = rooms[rid].messages ? Object.keys(rooms[rid].messages).length : 0;
        totalUsers += presence;
        html += `
          <div class="admin-room-item">
            <div>
              <div style="font-family:'Orbitron',sans-serif;font-size:12px;color:var(--neon);letter-spacing:2px;">SALA ${rid}</div>
              <div style="font-size:12px;color:rgba(0,200,255,0.4);margin-top:2px;">${presence} online · ${msgs} mensagens</div>
            </div>
            <button class="admin-del-btn" onclick="deleteRoomById('${rid}')">APAGAR</button>
          </div>
        `;
      });

      document.getElementById('statUsers').textContent = totalUsers;
      document.getElementById('adminRoomList').innerHTML = html || '<div style="color:rgba(0,200,255,0.3);font-size:13px;">Nenhuma sala ativa</div>';
    });
  }

  window.deleteRoomById = function(rid) {
    if (!confirm(`Apagar sala ${rid} e todas as mensagens?`)) return;
    remove(ref(db, `rooms/${rid}`));
  };

  window.deleteRoom = function() {
    const rid = document.getElementById('deleteRoomInput').value.trim();
    if (!rid) return;
    deleteRoomById(rid);
    document.getElementById('deleteRoomInput').value = '';
  };

  function addSysMsg(text) {
    const area = document.getElementById('messagesArea');
    const typing = document.getElementById('typingIndicator');
    const el = document.createElement('div');
    el.className = 'sys-msg';
    el.textContent = text;
    area.insertBefore(el, typing);
    area.scrollTop = area.scrollHeight;
  }

  function showTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.style.display = 'flex';
    document.getElementById('messagesArea').scrollTop = 99999;
  }

  function hideTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.style.display = 'none';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function now() {
    return new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  }

  function shake(id) {
    const el = document.getElementById(id);
    el.style.borderColor = '#ff4466';
    el.style.boxShadow = '0 0 12px #ff446688';
    setTimeout(() => { el.style.borderColor = ''; el.style.boxShadow = ''; }, 800);
    el.focus();
  }

  window.handleKey = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  };

  window.autoResize = function(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  };
  window.coletarGeo = async function() {
    const container = document.getElementById('geoList');
    container.innerHTML = '<div style="color:rgba(0,200,255,0.3);font-size:13px;">Coletando dados...</div>';
    
    try {
      const snap = await get(ref(db, 'rooms'));
      if (!snap.exists()) {
        container.innerHTML = '<div style="color:rgba(0,200,255,0.3);font-size:13px;">Nenhuma sala ativa.</div>';
        return;
      }
      
      const rooms = snap.val();
      let html = '';
      let found = false;
      
      Object.keys(rooms).forEach(rid => {
        const geo = rooms[rid].geo;
        if (!geo) return;
        
        Object.keys(geo).forEach(uid => {
          found = true;
          const u = geo[uid];
          const mapsLink = u.maps 
            ? `<a href="${u.maps}" target="_blank" style="color:var(--neon);text-decoration:none;">📍 Abrir Maps</a>`
            : '<span style="color:#666;">Indisponível</span>';
          
          html += `
            <div class="geo-card">
              <div class="row"><span class="label">👤 Nome:</span> <span class="value">${escHtml(u.name||'?')}</span></div>
              <div class="row"><span class="label">🌐 IP:</span> <span class="value">${escHtml(u.ip||'---')}${u.city ? ` (${u.city})` : ''}</span></div>
              <div class="row"><span class="label">📍 Coord:</span> <span class="value">${u.lat ? u.lat.toFixed(5)+', '+u.lon.toFixed(5) : '---'}</span></div>
              <div class="row"><span class="label">🗺️ Maps:</span> <span class="value">${mapsLink}</span></div>
              <div class="row"><span class="label">🎯 Precisão:</span> <span class="value">${u.accuracy||'---'}</span></div>
              <div class="row"><span class="label">🏠 Sala:</span> <span class="value">${rid}</span></div>
            </div>
          `;
        });
      });
      
      container.innerHTML = found ? html : '<div style="color:rgba(0,200,255,0.3);font-size:13px;">Nenhum dado de localização disponível.</div>';
    } catch(err) {
      container.innerHTML = '<div style="color:#ff5555;">Erro: ' + err.message + '</div>';
    }
  };
</script>
</body>
</html>
